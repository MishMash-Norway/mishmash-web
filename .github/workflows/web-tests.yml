name: Web Quality Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate_directory:
    name: Validate directory data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate directory
        run: python3 scripts/validate_directory.py

      - name: Readability of adaptive pages (non-blocking)
        continue-on-error: true
        run: python3 scripts/check_readability.py --strict

  build_site:
    name: Build static site
    runs-on: ubuntu-latest
    needs: validate_directory
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --trace

  link_check:
    name: Check links in generated HTML
    runs-on: ubuntu-latest
    needs: build_site
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --trace

      - name: Run htmlproofer
        run: |
          bundle exec htmlproofer ./_site \
            --disable-external \
            --no-enforce-https

  external_link_audit:
    name: External link audit (non-blocking)
    runs-on: ubuntu-latest
    needs: build_site
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --trace

      - name: Run htmlproofer (external links)
        continue-on-error: true
        run: |
          bundle exec htmlproofer ./_site \
            --checks Links \
            --no-enforce-https \
            --ignore-urls "/^\//,/^#/,/^mailto:/,/^tel:/,/fonts\.gstatic\.com/,/doi\.org/,/dx\.doi\.org/,/nilu\.com/,/no\.gramo\.no/,/linkedin\.com/,/upf\.edu/,/worldcat\.org/,/scopus\.com/,/dhko\.no/,/nettskjema\.no/,/calendar\.google\.com/,/aesthetics\.mpg\.de/,/notam\.b-cdn\.net/,/sfu\.ca/"

  html_validation:
    name: Validate HTML (Nu)
    runs-on: ubuntu-latest
    needs: build_site
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --trace

      - name: Run Nu HTML Checker
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: ./_site

  accessibility_check:
    name: Accessibility scan (Pa11y)
    runs-on: ubuntu-latest
    needs: build_site
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --trace

      - name: Serve generated site and run Pa11y CI
        run: |
          python3 -m http.server 4000 --directory _site &
          npx --yes wait-on@7 http://127.0.0.1:4000/
          npx --yes pa11y-ci@3 --config .pa11yci.json
