name: Update directory people from NVA and ORCID

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Enrich people directory
        env:
          NVA_API_ENV: prod
          NVA_CLIENT_ID: ${{ secrets.NVA_CLIENT_ID }}
          NVA_CLIENT_SECRET: ${{ secrets.NVA_CLIENT_SECRET }}
        run: |
          python3 scripts/enrich_directory_from_nva.py \
            --discover-nva \
            --discover-nva-loose \
            --max-works 10

      - name: Sync MishMash results from NVA
        env:
          NVA_API_ENV: prod
          NVA_CLIENT_ID: ${{ secrets.NVA_CLIENT_ID }}
          NVA_CLIENT_SECRET: ${{ secrets.NVA_CLIENT_SECRET }}
        run: python3 scripts/sync_results_from_nva.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No directory changes to commit."
            exit 0
          fi
          git add site/_directory/people site/assets/images/portraits/circle site/_data/mishmash_results.yml
          git commit -m "Update directory and results from NVA." \
            -m "Scheduled sync of people profiles and MishMash project results."
          git push
