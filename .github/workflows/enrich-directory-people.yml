name: Update directory people from NVA and ORCID

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Enrich people directory
        env:
          NVA_API_ENV: prod
          NVA_CLIENT_ID: ${{ secrets.NVA_CLIENT_ID }}
          NVA_CLIENT_SECRET: ${{ secrets.NVA_CLIENT_SECRET }}
        run: |
          python3 scripts/enrich_directory_from_nva.py \
            --discover-nva \
            --discover-nva-loose \
            --max-works 10

      - name: Sync MishMash results from NVA
        env:
          NVA_API_ENV: prod
          NVA_CLIENT_ID: ${{ secrets.NVA_CLIENT_ID }}
          NVA_CLIENT_SECRET: ${{ secrets.NVA_CLIENT_SECRET }}
        run: python3 scripts/sync_results_from_nva.py

      - name: Sync reciprocal directory links
        run: python3 scripts/sync_directory_reciprocity.py

      - name: Merge similar tags
        run: python3 scripts/merge_tags.py

      - name: Validate directory
        run: python3 scripts/validate_directory.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          changed_files="$(git status --porcelain --untracked-files=all | awk '{print $2}')"
          if [ -z "$changed_files" ]; then
            echo "No directory changes to commit."
            exit 0
          fi
          unexpected_files="$(printf '%s\n' "$changed_files" | grep -Ev '^(site/_directory|site/_data|site/assets/images/portraits)/' || true)"
          if [ -n "$unexpected_files" ]; then
            echo "::error title=Unexpected workflow diff::Refusing to push files outside the approved paths."
            echo "Refusing to push unexpected changed files:"
            printf '%s\n' "$unexpected_files"
            exit 1
          fi
          git add site/_directory site/_data site/assets/images/portraits
          git commit -m "Update directory and results from NVA." \
            -m "Scheduled sync of people profiles and MishMash project results."
          git push
