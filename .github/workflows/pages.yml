name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Generate page git metadata
        run: python3 scripts/generate_page_git_meta.py

      - name: Build site
        run: bundle exec jekyll build --trace

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # GitHub Pages intermittently fails at syncing_files with
      # "Deployment failed, try again later." — retry with backoff.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 120

      - name: Deploy to GitHub Pages (retry 1)
        id: deployment_retry1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before final retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        run: sleep 300

      - name: Deploy to GitHub Pages (retry 2)
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        uses: actions/deploy-pages@v5
