# /home/alexanje/github/mishmash-web/_config.yml
markdown: kramdown
remote_theme: pages-themes/cayman@v0.2.0
title: "MishMash Centre for AI and Creativity"
description: "A Norwegian AI centre funded by the Research Council of Norway (2025-2030)"
url: "https://mishmash.no"
show_downloads: false
license: "CC BY 4.0"
github:
  is_project_page: true
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-redirect-from

sass:
  style: compressed

collections:
  news:
    output: true
    permalink: /news/:title/
  events:
    output: true
    permalink: /events/:title/
  directory:
    output: true
    permalink: /directory/:path/

defaults:
  - scope:
      path: "_directory/people"
      type: "directory"
    values:
      layout: person
  - scope:
      path: "_directory/institutions"
      type: "directory"
    values:
      layout: page

# optional: ask jekyll-feed to include these collections (if plugin version supports it)
feed:
  collections:
    - news
    - events

future: true
timezone: Europe/Oslo

# SHA-256 hash of the shared password for internal WP pages.
# Default password: mishmash2025
# To change: compute `echo -n 'newpassword' | sha256sum` and replace the value below.
internal_password_hash: "3673331eee66d106e73f1f8d33c7df13a95d69e141c7419a767a1d515e556890"
