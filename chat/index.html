---
layout: default
title: Chat
---

<style>
#chat-wrapper {
  display: flex;
  flex-direction: column;
  max-width: 820px;
  margin: 0 auto;
  padding: 1rem 0 0;
  height: calc(100vh - 260px);
  min-height: 400px;
}

#setup-panel {
  padding-bottom: 1rem;
}

#webgpu-status {
  margin-bottom: 0.75rem;
  font-size: 0.9em;
}

#webgpu-ok  { color: #2a7a2a; }
#webgpu-err { color: #c00; }

#model-row {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  flex-wrap: wrap;
}

#model-select {
  flex: 1;
  min-width: 220px;
  padding: 0.45rem 0.6rem;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.95em;
  background: #fff;
}

#load-btn,
#send-btn {
  background: #A7A1F4;
  color: #363644;
  border: none;
  border-radius: 6px;
  padding: 0.5rem 1.3rem;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.95em;
  font-weight: 600;
  white-space: nowrap;
  transition: background 0.15s;
}

#load-btn:hover:not(:disabled),
#send-btn:hover:not(:disabled) {
  background: #C1F7AE;
}

#load-btn:disabled,
#send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#progress-container {
  margin-top: 0.75rem;
}

#progress-track {
  width: 100%;
  height: 8px;
  background: #e0e0e0;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 0.35rem;
}

#progress-fill {
  height: 100%;
  background: #A7A1F4;
  width: 0%;
  transition: width 0.25s ease;
}

#progress-text {
  font-size: 0.83em;
  color: #555;
  margin: 0;
}

#messages {
  flex: 1;
  overflow-y: auto;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 1rem;
  background: #fafafa;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.message {
  display: flex;
}

.message.user      { justify-content: flex-end; }
.message.assistant { justify-content: flex-start; }

.bubble {
  max-width: 75%;
  padding: 0.6rem 0.95rem;
  border-radius: 14px;
  font-size: 0.95em;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}

.message.user .bubble {
  background: #A7A1F4;
  color: #363644;
  border-bottom-right-radius: 4px;
}

.message.assistant .bubble {
  background: #C1F7AE;
  color: #363644;
  border-bottom-left-radius: 4px;
}

#input-area {
  display: none;
  gap: 0.5rem;
  padding-top: 0.75rem;
  align-items: flex-end;
}

#user-input {
  flex: 1;
  padding: 0.55rem 0.8rem;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.95em;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  line-height: 1.45;
  overflow-y: auto;
}

#user-input:focus {
  outline: none;
  border-color: #A7A1F4;
  box-shadow: 0 0 0 2px rgba(167,161,244,0.3);
}
</style>

<h1>Chat</h1>
<p>Chat with a local AI model running entirely in your browser via <a href="https://webllm.mlc.ai/" target="_blank" rel="noopener">WebLLM</a>. No data is sent to any server — the model runs on your device using WebGPU. The model is downloaded once and cached locally.</p>

<div id="chat-wrapper">

  <div id="setup-panel">
    <p id="webgpu-status"></p>
    <div id="model-row">
      <label for="model-select"><strong>Model:</strong></label>
      <select id="model-select">
        <option value="SmolLM2-1.7B-Instruct-q4f16_1-MLC">SmolLM2 1.7B (~1.0 GB) — fast</option>
        <option value="Llama-3.2-1B-Instruct-q4f32_1-MLC">Llama 3.2 1B (~0.9 GB) — fastest</option>
        <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama 3.2 3B (~2.0 GB) — good balance</option>
        <option value="Phi-3.5-mini-instruct-q4f16_1-MLC">Phi-3.5 Mini (~2.2 GB) — higher quality</option>
        <option value="gemma-2-2b-it-q4f16_1-MLC">Gemma 2 2B (~1.6 GB)</option>
      </select>
      <button id="load-btn">Load model</button>
    </div>
    <div id="progress-container" style="display:none">
      <div id="progress-track"><div id="progress-fill"></div></div>
      <p id="progress-text"></p>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="user-input" rows="1"
      placeholder="Type a message… (Enter to send, Shift+Enter for new line)"></textarea>
    <button id="send-btn">Send</button>
  </div>

</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const SYSTEM_PROMPT = "You are a helpful assistant for MishMash, the Norwegian Centre for AI and Creativity. " +
  "MishMash is a consortium of Norwegian research institutions exploring Creative AI and CoCreative AI across " +
  "music, art, performance, education, well-being, cultural heritage, and the creative industries. " +
  "Answer questions helpfully and concisely.";

let engine = null;
let chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
let isGenerating = false;

// WebGPU check
const webgpuStatus = document.getElementById("webgpu-status");
if (!navigator.gpu) {
  webgpuStatus.innerHTML =
    '<span id="webgpu-err">⚠ WebGPU is not available in your browser. ' +
    'Please use Chrome 113+, Edge 113+, or another WebGPU-enabled browser.</span>';
  document.getElementById("load-btn").disabled = true;
} else {
  webgpuStatus.innerHTML = '<span id="webgpu-ok">✓ WebGPU is available.</span>';
}

// Load model
document.getElementById("load-btn").addEventListener("click", async () => {
  const modelId   = document.getElementById("model-select").value;
  const loadBtn   = document.getElementById("load-btn");
  const modelSel  = document.getElementById("model-select");
  const progCont  = document.getElementById("progress-container");
  const progText  = document.getElementById("progress-text");
  const progFill  = document.getElementById("progress-fill");

  loadBtn.disabled  = true;
  modelSel.disabled = true;
  progCont.style.display = "block";
  progText.textContent   = "Initialising…";

  try {
    engine = await webllm.CreateMLCEngine(modelId, {
      initProgressCallback: (progress) => {
        progText.textContent = progress.text;
        const m = progress.text.match(/(\d+\.?\d*)%/);
        if (m) progFill.style.width = m[1] + "%";
      },
    });
    document.getElementById("setup-panel").style.display = "none";
    document.getElementById("input-area").style.display  = "flex";
    document.getElementById("user-input").focus();
  } catch (err) {
    progText.textContent  = "Error loading model: " + err.message;
    loadBtn.disabled      = false;
    modelSel.disabled     = false;
  }
});

// Send on button click or Enter (Shift+Enter for newline)
document.getElementById("send-btn").addEventListener("click", sendMessage);
document.getElementById("user-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
const textarea = document.getElementById("user-input");
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + "px";
});

async function sendMessage() {
  if (isGenerating || !engine) return;
  const text = textarea.value.trim();
  if (!text) return;

  textarea.value = "";
  textarea.style.height = "auto";
  isGenerating = true;
  document.getElementById("send-btn").disabled = true;

  chatHistory.push({ role: "user", content: text });
  appendMessage("user", text);

  const assistantBubble = appendMessage("assistant", "▌");

  try {
    const stream = await engine.chat.completions.create({
      messages: chatHistory,
      stream: true,
    });

    let responseText = "";
    for await (const chunk of stream) {
      const delta = chunk.choices[0]?.delta?.content ?? "";
      responseText += delta;
      assistantBubble.textContent = responseText + "▌";
      scrollToBottom();
    }
    assistantBubble.textContent = responseText;
    chatHistory.push({ role: "assistant", content: responseText });
  } catch (err) {
    assistantBubble.textContent = "Error: " + err.message;
  }

  isGenerating = false;
  document.getElementById("send-btn").disabled = false;
  textarea.focus();
}

function appendMessage(role, text) {
  const messagesEl = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "message " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollToBottom();
  return bubble;
}

function scrollToBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}
</script>
