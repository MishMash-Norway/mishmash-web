<style>

}

<h1>Chat</h1>
<p>Chat with a local AI model that answers questions about MishMash based on the site's content. The model runs entirely in your browser via <a href="https://webllm.mlc.ai/" target="_blank" rel="noopener">WebLLM</a> — no data is sent to any server. The model is downloaded once and cached locally.</p>

<div id="chat-wrapper">

  <div id="setup-panel">
    <p id="webgpu-status"></p>
    <p id="kb-status">Loading knowledge base…</p>
    <div id="model-row">
      <label for="model-select"><strong>Model:</strong></label>
      <select id="model-select">
        <option value="SmolLM2-1.7B-Instruct-q4f16_1-MLC">SmolLM2 1.7B (~1.0 GB) — fast</option>
        <option value="Llama-3.2-1B-Instruct-q4f32_1-MLC">Llama 3.2 1B (~0.9 GB) — fastest</option>
        <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama 3.2 3B (~2.0 GB) — good balance</option>
        <option value="Phi-3.5-mini-instruct-q4f16_1-MLC">Phi-3.5 Mini (~2.2 GB) — higher quality</option>
        <option value="gemma-2-2b-it-q4f16_1-MLC">Gemma 2 2B (~1.6 GB)</option>
      </select>
      <button id="load-btn">Load model</button>
    </div>
    <div id="progress-container" style="display:none">
      <div id="progress-track"><div id="progress-fill"></div></div>
      <p id="progress-text"></p>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="user-input" rows="1"
      placeholder="Ask about MishMash… (Enter to send, Shift+Enter for new line)"></textarea>
    <button id="send-btn">Send</button>
  </div>

</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

// ── System prompt ─────────────────────────────────────────────────────────
const SYSTEM_PROMPT =
  "You are a helpful assistant for MishMash, the Norwegian Centre for AI and Creativity. " +
  "MishMash is a consortium of Norwegian research institutions exploring Creative AI and " +
  "CoCreative AI across music, art, performance, education, well-being, cultural heritage, " +
  "and the creative industries. " +
  "When context passages from the MishMash knowledge base are provided, base your answer " +
  "primarily on those. If the context does not cover the question, answer from your general knowledge. " +
  "Be concise and friendly.";

// ── State ─────────────────────────────────────────────────────────────────
let engine = null;
let knowledgeBase = null;
let chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
let isGenerating = false;

// ── Knowledge base ────────────────────────────────────────────────────────
const STOP_WORDS = new Set([
  'a','an','the','and','or','but','if','in','on','at','to','for','of','with',
  'by','from','is','it','be','as','so','we','he','she','they','you','i',
  'this','that','these','those','are','was','were','been','have','has','had',
  'do','does','did','will','would','could','should','may','might','can','not',
  'no','nor','yet','both','either','neither','also','than','then','when','where',
  'which','who','what','how','all','each','every','any','some','its','their',
  'our','your','his','her','more','into','through','about','such','only','very',
  'just','over','after','before','up','out','there','here','being','having',
]);

function tokenize(text) {
  return (text.toLowerCase().match(/\b[a-z][a-z0-9]*\b/g) || [])
    .filter(t => !STOP_WORDS.has(t) && t.length > 2);
}

function retrieve(query, topK = 4) {
  if (!knowledgeBase) return [];
  const queryTokens = tokenize(query);
  if (queryTokens.length === 0) return [];

  // Query TF
  const tf = {};
  for (const t of queryTokens) tf[t] = (tf[t] || 0) + 1;
  const total = queryTokens.length;

  // Query TF-IDF vector
  const queryVec = {};
  for (const t in tf) {
    if (knowledgeBase.idf[t]) {
      queryVec[t] = (tf[t] / total) * knowledgeBase.idf[t];
    }
  }
  const queryNorm = Math.sqrt(Object.values(queryVec).reduce((s, v) => s + v * v, 0));
  if (queryNorm === 0) return [];

  // Score each chunk by cosine similarity
  const scored = knowledgeBase.chunks.map(chunk => {
    let dot = 0;
    for (const t in queryVec) {
      if (chunk.tfidf[t]) dot += queryVec[t] * chunk.tfidf[t];
    }
    const chunkNorm = Math.sqrt(
      Object.values(chunk.tfidf).reduce((s, v) => s + v * v, 0)
    );
    return { chunk, score: chunkNorm > 0 ? dot / (queryNorm * chunkNorm) : 0 };
  });

  return scored
    .filter(s => s.score > 0.05)
    .sort((a, b) => b.score - a.score)
    .slice(0, topK)
    .map(s => s.chunk);
}

function buildAugmentedContent(userText, chunks) {
  if (chunks.length === 0) return userText;
  const context = chunks
    .map(c => `[${c.source}]\n${c.text}`)
    .join('\n\n---\n\n');
  return `Relevant excerpts from the MishMash knowledge base:\n\n${context}\n\n---\n\nQuestion: ${userText}`;
}

async function loadKnowledgeBase() {
  const kbStatus = document.getElementById('kb-status');
  try {
    const resp = await fetch('/chat/knowledge.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    knowledgeBase = await resp.json();
    kbStatus.innerHTML =
      `Knowledge base: <strong>${knowledgeBase.chunks.length} passages</strong> loaded from MishMash content.`;
  } catch (e) {
    kbStatus.textContent = 'Knowledge base unavailable — using general knowledge only.';
  }
}

// Start loading knowledge base immediately (parallel with page init)
loadKnowledgeBase();

// ── WebGPU check ──────────────────────────────────────────────────────────
const webgpuStatus = document.getElementById("webgpu-status");
if (!navigator.gpu) {
  webgpuStatus.innerHTML =
    '<span id="webgpu-err">⚠ WebGPU is not available in your browser. ' +
    'Please use Chrome 113+, Edge 113+, or another WebGPU-enabled browser.</span>';
  document.getElementById("load-btn").disabled = true;
} else {
  webgpuStatus.innerHTML = '<span id="webgpu-ok">✓ WebGPU is available.</span>';
}

// ── Model loading ─────────────────────────────────────────────────────────
document.getElementById("load-btn").addEventListener("click", async () => {
  const modelId  = document.getElementById("model-select").value;
  const loadBtn  = document.getElementById("load-btn");
  const modelSel = document.getElementById("model-select");
  const progCont = document.getElementById("progress-container");
  const progText = document.getElementById("progress-text");
  const progFill = document.getElementById("progress-fill");

  loadBtn.disabled  = true;
  modelSel.disabled = true;
  progCont.style.display = "block";
  progText.textContent   = "Initialising…";

  try {
    engine = await webllm.CreateMLCEngine(modelId, {
      initProgressCallback: (progress) => {
        progText.textContent = progress.text;
        const m = progress.text.match(/(\d+\.?\d*)%/);
        if (m) progFill.style.width = m[1] + "%";
      },
    });
    document.getElementById("setup-panel").style.display = "none";
    document.getElementById("input-area").style.display  = "flex";
    document.getElementById("user-input").focus();
  } catch (err) {
    progText.textContent = "Error loading model: " + err.message;
    loadBtn.disabled     = false;
    modelSel.disabled    = false;
  }
});

// ── Send message ──────────────────────────────────────────────────────────
document.getElementById("send-btn").addEventListener("click", sendMessage);
document.getElementById("user-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

const textarea = document.getElementById("user-input");
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + "px";
});

async function sendMessage() {
  if (isGenerating || !engine) return;
  const userText = textarea.value.trim();
  if (!userText) return;

  textarea.value = "";
  textarea.style.height = "auto";
  isGenerating = true;
  document.getElementById("send-btn").disabled = true;

  // Retrieve relevant context
  const chunks = retrieve(userText);
  const augmentedContent = buildAugmentedContent(userText, chunks);

  // Display the original (unaugmented) user text in the UI
  appendMessage("user", userText);

  // Include augmented message in the history sent to the model
  chatHistory.push({ role: "user", content: augmentedContent });

  const { bubble: assistantBubble, messageEl } = appendMessageEl("assistant", "▌");

  try {
    const stream = await engine.chat.completions.create({
      messages: chatHistory,
      stream: true,
    });

    let responseText = "";
    for await (const chunk of stream) {
      const delta = chunk.choices[0]?.delta?.content ?? "";
      responseText += delta;
      assistantBubble.textContent = responseText + "▌";
      scrollToBottom();
    }
    assistantBubble.textContent = responseText;
    chatHistory.push({ role: "assistant", content: responseText });

    // Show sources if context was used
    if (chunks.length > 0) {
      const uniqueSources = [...new Set(chunks.map(c => c.source))];
      const details = document.createElement("details");
      details.className = "sources";
      const summary = document.createElement("summary");
      summary.textContent = `Sources (${uniqueSources.length})`;
      const list = document.createElement("div");
      list.className = "sources-list";
      list.textContent = uniqueSources.join(" · ");
      details.appendChild(summary);
      details.appendChild(list);
      messageEl.appendChild(details);
      scrollToBottom();
    }
  } catch (err) {
    assistantBubble.textContent = "Error: " + err.message;
  }

  isGenerating = false;
  document.getElementById("send-btn").disabled = false;
  textarea.focus();
}

function appendMessage(role, text) {
  const { bubble } = appendMessageEl(role, text);
  return bubble;
}

function appendMessageEl(role, text) {
  const messagesEl = document.getElementById("messages");
  const messageEl  = document.createElement("div");
  messageEl.className = "message " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  messageEl.appendChild(bubble);
  messagesEl.appendChild(messageEl);
  scrollToBottom();
  return { bubble, messageEl };
}

function scrollToBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}
</script>
