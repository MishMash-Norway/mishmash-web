<svg width="500" height="320" viewBox="0 0 420 320"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
    <!-- Left circle: Humans -->
    <!-- purple -->
    <circle cx="100" cy="160" r="110"
      fill="#A7A1F4"
      stroke="#777"
      stroke-width="1"/>

    <!-- Right circle: Machines -->
    <!-- green -->
    <circle cx="320" cy="160" r="110"
      fill="#C1F7AE"
      stroke="#777"
      stroke-width="1"/>

  <!-- Left: Humans -->
  <text x="90" y="165"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="18"
        fill="#333">
    Humans
  </text>

  <!-- Right: Machines -->
  <text x="330" y="165"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="18"
        fill="#333">
    Machines
  </text>

</svg>
