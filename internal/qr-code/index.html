---
layout: default
title: Internal QR Code Generator
---

<div class="main-content" role="region" aria-label="QR code generator">
  <h2>MishMash-style QR code generator</h2>

  <div id="mm-qr-tool" style="max-width:760px;margin:1.2rem auto;padding:1rem 1rem 1.2rem;border:1px solid #d9d9df;border-radius:10px;background:#fafafe;">
    <div style="display:grid;gap:0.8rem;">
      <label for="qr-url" style="font-weight:700;">URL</label>
      <input id="qr-url" type="text" value="https://mishmash.no/" style="padding:0.6rem 0.7rem;border:1px solid #bbb;border-radius:8px;width:100%;" />

      <label for="qr-size" style="font-weight:700;">Size</label>
      <select id="qr-size" style="padding:0.6rem 0.7rem;border:1px solid #bbb;border-radius:8px;width:max-content;min-width:180px;background:#fff;">
        <option value="200">Small</option>
        <option value="280" selected>Medium</option>
        <option value="360">Large</option>
      </select>

      <div style="display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center;">
        <button id="qr-generate" type="button" class="btn">Generate</button>
        <button id="qr-download" type="button" class="btn">Download PNG</button>
      </div>

      <label for="qr-swap" style="display:flex;gap:0.5rem;align-items:center;">
        <input id="qr-swap" type="checkbox" />
        Swap colours
      </label>

      <div id="qr-wrap" style="display:inline-block;padding:20px;background:#C1F7AE;border-radius:10px;max-width:max-content;">
        <div id="qr-preview" style="padding:0;background:#A7A1F4;line-height:0;"></div>
      </div>

      <div id="qr-hidden" style="display:none;"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
(function () {
  const COLORS = {
    bg: "#A7A1F4",
    border: "#C1F7AE",
    qr: "#363644"
  };

  const borderPx = 20;

  const urlInput = document.getElementById("qr-url");
  const sizeInput = document.getElementById("qr-size");
  const preview = document.getElementById("qr-preview");
  const hiddenTarget = document.getElementById("qr-hidden");
  const swapInput = document.getElementById("qr-swap");
  const generateBtn = document.getElementById("qr-generate");
  const downloadBtn = document.getElementById("qr-download");

  let qrInstance = null;
  let renderedCanvas = null;

  function getFrameColors() {
    if (swapInput && swapInput.checked) {
      return {
        frameOuter: COLORS.bg,
        frameInner: COLORS.border
      };
    }
    return {
      frameOuter: COLORS.border,
      frameInner: COLORS.bg
    };
  }

  function getSelectedSize() {
    const parsed = Number.parseInt(sizeInput.value, 10);
    return Number.isFinite(parsed) && parsed > 0 ? parsed : 280;
  }

  function isFinderCell(row, col, count) {
    const inTopLeft = row < 7 && col < 7;
    const inTopRight = row < 7 && col >= count - 7;
    const inBottomLeft = row >= count - 7 && col < 7;
    return inTopLeft || inTopRight || inBottomLeft;
  }

  function renderStyledQr(model, qrSize, frameColors) {
    const count = model.getModuleCount();
    const quietZone = 4;
    const totalModules = count + quietZone * 2;
    const moduleSize = qrSize / totalModules;
    const origin = quietZone * moduleSize;

    const canvas = document.createElement("canvas");
    canvas.width = qrSize;
    canvas.height = qrSize;

    const ctx = canvas.getContext("2d");
    ctx.fillStyle = frameColors.frameInner;
    ctx.fillRect(0, 0, qrSize, qrSize);
    ctx.fillStyle = COLORS.qr;

    for (let row = 0; row < count; row += 1) {
      for (let col = 0; col < count; col += 1) {
        if (!model.isDark(row, col)) {
          continue;
        }

        const x = origin + col * moduleSize;
        const y = origin + row * moduleSize;

        if (isFinderCell(row, col, count)) {
          ctx.fillRect(x, y, moduleSize, moduleSize);
          continue;
        }

        const radius = moduleSize * 0.38;
        ctx.beginPath();
        ctx.arc(x + moduleSize / 2, y + moduleSize / 2, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    return canvas;
  }

  function generateQr() {
    const value = (urlInput.value || "").trim();
    if (!value) {
      alert("Please enter a URL or text.");
      return;
    }

    const qrSize = getSelectedSize();
    preview.innerHTML = "";
    hiddenTarget.innerHTML = "";
    const frameColors = getFrameColors();
    const wrap = document.getElementById("qr-wrap");
    if (wrap) {
      wrap.style.background = frameColors.frameOuter;
    }
    preview.style.background = frameColors.frameInner;
    qrInstance = new QRCode(hiddenTarget, {
      text: value,
      width: qrSize,
      height: qrSize,
      colorDark: COLORS.qr,
      colorLight: frameColors.frameInner,
      correctLevel: QRCode.CorrectLevel.H
    });

    renderedCanvas = renderStyledQr(qrInstance._oQRCode, qrSize, frameColors);
    preview.appendChild(renderedCanvas);
  }

  function downloadQr() {
    const value = (urlInput.value || "").trim();
    if (!value) {
      alert("Generate a QR code first.");
      return;
    }

    if (!renderedCanvas) {
      alert("Generate a QR code first.");
      return;
    }

    const qrSize = getSelectedSize();
    const out = document.createElement("canvas");
    const outSize = qrSize + borderPx * 2;
    out.width = outSize;
    out.height = outSize;

    const frameColors = getFrameColors();
    const ctx = out.getContext("2d");
    ctx.fillStyle = frameColors.frameOuter;
    ctx.fillRect(0, 0, outSize, outSize);

    function buildFileName() {
      const now = new Date();
      const y = String(now.getFullYear());
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");
      return "qrcode_" + y + m + d + "_" + hh + mm + ss + ".png";
    }

    function saveCanvas() {
      const a = document.createElement("a");
      a.href = out.toDataURL("image/png");
      a.download = buildFileName();
      a.click();
    }

    ctx.drawImage(renderedCanvas, borderPx, borderPx, qrSize, qrSize);
    saveCanvas();
  }

  generateBtn.addEventListener("click", generateQr);
  downloadBtn.addEventListener("click", downloadQr);
  sizeInput.addEventListener("change", generateQr);
  swapInput.addEventListener("change", generateQr);
  urlInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      generateQr();
    }
  });

  generateQr();
})();
</script>
