---
layout: default
title: Internal QR Code Generator
---

<main class="main-content" role="main">
  <h2>MishMash-style QR code generator</h2>

  <div id="mm-qr-tool" style="max-width:760px;margin:1.2rem auto;padding:1rem 1rem 1.2rem;border:1px solid #d9d9df;border-radius:10px;background:#fafafe;">
    <div style="display:grid;gap:0.8rem;">
      <label for="qr-url" style="font-weight:700;">URL or text</label>
      <input id="qr-url" type="text" value="https://mishmash.no/" style="padding:0.6rem 0.7rem;border:1px solid #bbb;border-radius:8px;width:100%;" />

      <div style="display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center;">
        <button id="qr-generate" type="button" class="btn">Generate</button>
        <button id="qr-download" type="button" class="btn">Download PNG</button>
      </div>

      <label for="qr-swap" style="display:flex;gap:0.5rem;align-items:center;">
        <input id="qr-swap" type="checkbox" />
        Swap frame colors (green/purple)
      </label>

      <div id="qr-wrap" style="display:inline-block;padding:20px;background:#C1F7AE;border-radius:10px;max-width:max-content;">
        <div id="qr-preview" style="padding:0;background:#A7A1F4;line-height:0;"></div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
(function () {
  const COLORS = {
    bg: "#A7A1F4",
    border: "#C1F7AE",
    qr: "#363644"
  };

  const size = 280;
  const borderPx = 20;

  const urlInput = document.getElementById("qr-url");
  const preview = document.getElementById("qr-preview");
  const swapInput = document.getElementById("qr-swap");
  const generateBtn = document.getElementById("qr-generate");
  const downloadBtn = document.getElementById("qr-download");

  let qrInstance = null;

  function getFrameColors() {
    if (swapInput && swapInput.checked) {
      return {
        frameOuter: COLORS.bg,
        frameInner: COLORS.border
      };
    }
    return {
      frameOuter: COLORS.border,
      frameInner: COLORS.bg
    };
  }

  function generateQr() {
    const value = (urlInput.value || "").trim();
    if (!value) {
      alert("Please enter a URL or text.");
      return;
    }

    preview.innerHTML = "";
    const frameColors = getFrameColors();
    const wrap = document.getElementById("qr-wrap");
    if (wrap) {
      wrap.style.background = frameColors.frameOuter;
    }
    preview.style.background = frameColors.frameInner;
    qrInstance = new QRCode(preview, {
      text: value,
      width: size,
      height: size,
      colorDark: COLORS.qr,
      colorLight: frameColors.frameInner,
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  function downloadQr() {
    const value = (urlInput.value || "").trim();
    if (!value) {
      alert("Generate a QR code first.");
      return;
    }

    const canvas = preview.querySelector("canvas");
    const img = preview.querySelector("img");

    if (!canvas && !img) {
      alert("Generate a QR code first.");
      return;
    }

    const out = document.createElement("canvas");
    const outSize = size + borderPx * 2;
    out.width = outSize;
    out.height = outSize;

    const frameColors = getFrameColors();
    const ctx = out.getContext("2d");
    ctx.fillStyle = frameColors.frameOuter;
    ctx.fillRect(0, 0, outSize, outSize);

    function buildFileName() {
      const now = new Date();
      const y = String(now.getFullYear());
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");
      return "qrcode_" + y + m + d + "_" + hh + mm + ss + ".png";
    }

    function saveCanvas() {
      const a = document.createElement("a");
      a.href = out.toDataURL("image/png");
      a.download = buildFileName();
      a.click();
    }

    if (canvas) {
      ctx.drawImage(canvas, borderPx, borderPx, size, size);
      saveCanvas();
      return;
    }

    const tmp = new Image();
    tmp.onload = function () {
      ctx.drawImage(tmp, borderPx, borderPx, size, size);
      saveCanvas();
    };
    tmp.src = img.src;
  }

  generateBtn.addEventListener("click", generateQr);
  downloadBtn.addEventListener("click", downloadQr);
  swapInput.addEventListener("change", generateQr);
  urlInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      generateQr();
    }
  });

  generateQr();
})();
</script>
