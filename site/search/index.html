---
layout: default
title: Search
description: "Search MishMash people, institutions, projects, pages, and events."
---
<h1>Search</h1>

<form id="search-form" role="search" aria-label="Site search">
  <div class="search-input-row">
    <label for="search-input" class="sr-only">Search</label>
    <input
      type="search"
      id="search-input"
      name="q"
      class="search-input"
      placeholder="Search events, news, pages…"
      autocomplete="off"
      spellcheck="false"
      aria-controls="search-results"
      aria-autocomplete="list"
    >
  </div>

  <div id="filter-panel" class="search-filters" aria-label="Filters" hidden>
    <div class="filter-group">
      <span class="filter-label">Type:</span>
      <div id="type-chips" class="chip-list" role="group" aria-label="Filter by type"></div>
    </div>
    <div id="role-filter-group" class="filter-group" hidden>
      <span class="filter-label">Role:</span>
      <div id="role-chips" class="chip-list" role="group" aria-label="Filter by role"></div>
    </div>
    <div id="wp-category-filter-group" class="filter-group" hidden>
      <span class="filter-label">WP:</span>
      <div id="wp-category-chips" class="chip-list" role="group" aria-label="Filter by work package"></div>
    </div>
    <div id="category-filter-group" class="filter-group" hidden>
      <span class="filter-label">Category:</span>
      <div id="category-chips" class="chip-list" role="group" aria-label="Filter by category"></div>
    </div>
    <details id="tag-filter-group" class="filter-group filter-group-collapsible" hidden>
      <summary class="filter-label">Tags<span class="filter-expand-icon" aria-hidden="true">▸</span></summary>
      <div id="tag-chips" class="chip-list" role="group" aria-label="Filter by tag"></div>
    </details>
  </div>
</form>

<div id="search-status" aria-live="polite" aria-atomic="true" class="search-status"></div>
<ul id="search-results" class="search-results" aria-label="Search results"></ul>

<script>
(function () {
  'use strict';

  const INDEX_URL = '{{ "/search.json" | relative_url }}';

  // ── State ──────────────────────────────────────────────────────────────────
  let allItems = [];
  let activeTypes      = new Set();
  let activeCategories = new Set();
  let activeTags       = new Set();
  let activeRoles      = new Set();

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const input                = document.getElementById('search-input');
  const resultsList          = document.getElementById('search-results');
  const statusEl             = document.getElementById('search-status');
  const filterPanel          = document.getElementById('filter-panel');
  const typeChips            = document.getElementById('type-chips');
  const roleFilterGroup      = document.getElementById('role-filter-group');
  const roleChips            = document.getElementById('role-chips');
  const wpCategoryFilterGroup = document.getElementById('wp-category-filter-group');
  const wpCategoryChips      = document.getElementById('wp-category-chips');
  const categoryChips        = document.getElementById('category-chips');
  const tagChips             = document.getElementById('tag-chips');
  const tagFilterGroup        = document.getElementById('tag-filter-group');
  const categoryFilterGroup  = document.getElementById('category-filter-group');

  // ── Helpers ────────────────────────────────────────────────────────────────
  function normalize(str) {
    return (str || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  }

  function escapeHtml(str) {
    return (str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function highlight(text, query) {
    if (!query) return escapeHtml(text);
    const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('(' + safe + ')', 'gi');
    const parts = text.split(re);
    return parts.map(function (part, i) {
      return i % 2 === 1
        ? '<mark>' + escapeHtml(part) + '</mark>'
        : escapeHtml(part);
    }).join('');
  }

  function typeLabel(type) {
    const map = { event: 'Event', news: 'News', page: 'Page', person: 'Person', institution: 'Institution', project: 'Project' };
    return map[type] || type;
  }

  function isWpCategory(val) {
    return /^WP\d+$/i.test(val);
  }

  // ── Chip factory ───────────────────────────────────────────────────────────
  function makeChip(label, activeSet, container, onToggle, displayText) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filter-chip';
    btn.textContent = displayText || label;
    btn.dataset.value = label;
    btn.setAttribute('aria-pressed', 'false');
    btn.addEventListener('click', function () {
      const val = this.dataset.value;
      if (activeSet.has(val)) {
        activeSet.delete(val);
        this.classList.remove('active');
        this.setAttribute('aria-pressed', 'false');
      } else {
        activeSet.add(val);
        this.classList.add('active');
        this.setAttribute('aria-pressed', 'true');
        if (container === tagChips) tagFilterGroup.open = true;
      }
      onToggle();
      updateUrl();
    });
    container.appendChild(btn);
  }

  // ── Role filter visibility ─────────────────────────────────────────────────
  function syncRoleFilterVisibility() {
    const personSelected = activeTypes.has('person');
    roleFilterGroup.hidden = !(personSelected && roleChips.children.length > 0);
    if (!personSelected && activeRoles.size) {
      activeRoles.clear();
      Array.from(roleChips.querySelectorAll('.filter-chip.active')).forEach(function (chip) {
        chip.classList.remove('active');
        chip.setAttribute('aria-pressed', 'false');
      });
    }
  }

  function syncCategoryFilterVisibility() {
    const eventSelected = activeTypes.has('event');
    categoryFilterGroup.hidden = !(eventSelected && categoryChips.children.length > 0);
    if (!eventSelected && activeCategories.size) {
      const cleared = [];
      activeCategories.forEach(function (c) {
        if (!isWpCategory(c)) cleared.push(c);
      });
      cleared.forEach(function (c) { activeCategories.delete(c); });
      Array.from(categoryChips.querySelectorAll('.filter-chip.active')).forEach(function (chip) {
        chip.classList.remove('active');
        chip.setAttribute('aria-pressed', 'false');
      });
    }
  }

  // ── Role groups ────────────────────────────────────────────────────────────
  const ROLE_GROUPS = {
    'Management':   ['Director', 'Deputy director', 'Administrative coordinator', 'Research advisor'],
    'Board member': ['Board Leader', 'Board member']
  };

  // Expand a chip label to the actual role values it covers
  function expandRole(label) {
    return ROLE_GROUPS[label] || [label];
  }

  // ── Build filter UI ────────────────────────────────────────────────────────
  function buildFilters(items) {
    const types      = new Set();
    const roles      = new Set();
    const wpCats     = new Set();
    const categories = new Set();
    const tags       = new Set();

    items.forEach(function (item) {
      if (item.type) types.add(item.type);
      (item.roles      || []).forEach(function (r) { roles.add(r); });
      (item.categories || []).forEach(function (c) {
        if (isWpCategory(c)) wpCats.add(c.toUpperCase());
        else if (c !== 'Administration') categories.add(c);
      });
      (item.tags || []).forEach(function (t) { tags.add(t); });
    });

    // Type chips — display title-case; custom toggle so role/category rows sync
    types.forEach(function (v) {
      makeChip(v, activeTypes, typeChips, function () {
        syncRoleFilterVisibility();
        syncCategoryFilterVisibility();
        runSearch();
      }, typeLabel(v));
    });

    // Role chips — collapse grouped roles into single chips
    const chipOrder = ['Management', 'Board member', 'Council member', 'Work package leader', 'Member'];

    // Build a flat set of all role values that belong to any group
    const groupedRoleValues = new Set();
    Object.values(ROLE_GROUPS).forEach(function (members) {
      members.forEach(function (r) { groupedRoleValues.add(normalize(r)); });
    });

    const chipLabels = new Set();
    // Add a group chip if any of its members exist in the data
    Object.keys(ROLE_GROUPS).forEach(function (groupLabel) {
      const members = new Set(ROLE_GROUPS[groupLabel].map(normalize));
      if ([...roles].some(function (r) { return members.has(normalize(r)); })) {
        chipLabels.add(groupLabel);
      }
    });
    // Add remaining ungrouped roles
    roles.forEach(function (r) {
      if (!groupedRoleValues.has(normalize(r))) chipLabels.add(r);
    });

    [...chipLabels].sort(function (a, b) {
      const ai = chipOrder.indexOf(a), bi = chipOrder.indexOf(b);
      if (ai < 0 && bi < 0) return a.localeCompare(b);
      return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
    }).forEach(function (v) { makeChip(v, activeRoles, roleChips, runSearch); });

    // WP category chips — sorted numerically, same activeCategories set
    [...wpCats].sort(function (a, b) {
      return parseInt(a.replace(/\D/g, ''), 10) - parseInt(b.replace(/\D/g, ''), 10);
    }).forEach(function (v) { makeChip(v, activeCategories, wpCategoryChips, runSearch); });
    if (wpCats.size > 0) wpCategoryFilterGroup.hidden = false;

    // Other category chips — sorted alphabetically
    [...categories].sort().forEach(function (v) { makeChip(v, activeCategories, categoryChips, runSearch); });

    // Tag chips
    [...tags].sort().forEach(function (v) { makeChip(v, activeTags, tagChips, runSearch); });
    if (tags.size > 0) tagFilterGroup.hidden = false;

    if (types.size > 0 || wpCats.size > 0 || categories.size > 0 || tags.size > 0) {
      filterPanel.hidden = false;
    }
  }

  // ── Constants ─────────────────────────────────────────────────────────────
  const SNIPPET_LENGTH = 200;

  // ── Main search ────────────────────────────────────────────────────────────
  function runSearch() {
    const rawQuery = input.value.trim();
    const query    = normalize(rawQuery);
    const hasFilter = activeTypes.size || activeCategories.size || activeTags.size || activeRoles.size;

    if (!query && !hasFilter) {
      resultsList.innerHTML = '';
      statusEl.textContent  = '';
      return;
    }

    const normCategories = [...activeCategories].map(normalize);
    const normTags       = [...activeTags].map(normalize);
    const normRoles      = [...activeRoles].map(normalize);

    const results = allItems.filter(function (item) {
      if (activeTypes.size && !activeTypes.has(item.type)) return false;
      if (normCategories.length) {
        const cats = (item.categories || []).map(normalize);
        if (!normCategories.some(function (c) { return cats.includes(c); })) return false;
      }
      if (normTags.length) {
        const itemTags = (item.tags || []).map(normalize);
        if (!normTags.some(function (t) { return itemTags.includes(t); })) return false;
      }
      if (activeRoles.size) {
        const itemRoles = (item.roles || []).map(normalize);
        const matches = [...activeRoles].some(function (label) {
          return expandRole(label).map(normalize).some(function (r) { return itemRoles.includes(r); });
        });
        if (!matches) return false;
      }
      if (query) {
        const haystack = normalize([item.title, item.description, item.content].join(' '));
        return haystack.includes(query);
      }
      return true;
    });

    renderResults(results, rawQuery);
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderResults(results, query) {
    resultsList.innerHTML = '';

    if (results.length === 0) {
      statusEl.textContent = 'No results found.';
      return;
    }

    statusEl.textContent = results.length + ' result' + (results.length === 1 ? '' : 's') + ' found.';

    results.forEach(function (item) {
      const li = document.createElement('li');
      li.className = 'search-result-item';

      const badgeHtml = '<span class="result-type-badge result-type-' + escapeHtml(item.type) + '">'
                      + escapeHtml(typeLabel(item.type)) + '</span>';

      const dateHtml = item.date
        ? '<span class="result-date">' + escapeHtml(item.date) + '</span>'
        : '';

      const wpCatList = (item.categories || []).filter(isWpCategory);
      const otherCats = (item.categories || []).filter(function (c) { return !isWpCategory(c); });

      const catsHtml = otherCats.length
        ? '<span class="result-cats">'
          + otherCats.map(function (c) { return '<span class="result-cat">' + escapeHtml(c) + '</span>'; }).join('')
          + '</span>'
        : '';

      const wpHtml = wpCatList.length
        ? '<div class="result-wp-tags">'
          + wpCatList.map(function (c) { return '<span class="result-wp-tag">' + escapeHtml(c.toUpperCase()) + '</span>'; }).join('')
          + '</div>'
        : '';

      const snippet = (item.description || item.content || '').substring(0, SNIPPET_LENGTH);

      li.innerHTML =
        '<div class="result-meta">' + badgeHtml + dateHtml + catsHtml + '</div>' +
        wpHtml +
        '<a class="result-title" href="' + escapeHtml(item.url) + '">'
          + highlight(item.title, query)
        + '</a>' +
        (snippet ? '<p class="result-snippet">' + highlight(snippet, query) + '</p>' : '');

      resultsList.appendChild(li);
    });
  }

  // ── Chip activation helpers (for URL hydration) ────────────────────────────
  function activateChipIn(container, value) {
    Array.from(container.querySelectorAll('.filter-chip')).forEach(function (chip) {
      if (chip.dataset.value === value) {
        chip.classList.add('active');
        chip.setAttribute('aria-pressed', 'true');
      }
    });
  }

  function activateTypeChip(type) {
    activeTypes.add(type);
    activateChipIn(typeChips, type);
    syncRoleFilterVisibility();
    syncCategoryFilterVisibility();
  }

  function activateTagChip(tag) {
    activeTags.add(tag);
    tagFilterGroup.open = true;
    activateChipIn(tagChips, tag);
  }

  function activateCategoryChip(cat) {
    activeCategories.add(cat);
    activateChipIn(isWpCategory(cat) ? wpCategoryChips : categoryChips, cat);
  }

  function activateRoleChip(role) {
    activeRoles.add(role);
    activateChipIn(roleChips, role);
  }

  // ── URL param hydration ────────────────────────────────────────────────────
  function hydrateFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) input.value = q;
    params.getAll('type').forEach(activateTypeChip);
    params.getAll('tag').forEach(activateTagChip);
    params.getAll('cat').forEach(activateCategoryChip);
    params.getAll('role').forEach(activateRoleChip);
  }

  // ── Sync URL while typing ─────────────────────────────────────────────────
  function updateUrl() {
    const params = new URLSearchParams();
    const q = input.value.trim();
    if (q) params.set('q', q);
    activeTypes     .forEach(function (v) { params.append('type', v); });
    activeTags      .forEach(function (v) { params.append('tag',  v); });
    activeCategories.forEach(function (v) { params.append('cat',  v); });
    activeRoles     .forEach(function (v) { params.append('role', v); });
    const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
    window.history.replaceState(null, '', newUrl);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  fetch(INDEX_URL)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      allItems = data;
      buildFilters(data);
      hydrateFromUrl();
      if (input.value || activeTypes.size || activeTags.size || activeCategories.size || activeRoles.size) runSearch();
    })
    .catch(function () {
      statusEl.textContent = 'Search index could not be loaded.';
    });

  let debounceTimer;
  input.addEventListener('input', function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function () {
      updateUrl();
      runSearch();
    }, 200);
  });

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      clearTimeout(debounceTimer);
      updateUrl();
      runSearch();
    }
  });
})();
</script>
