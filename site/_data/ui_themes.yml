# UI themes listed on the /ui/ preview gallery. Each name must match a
# folder under themes/ — the deploy workflow builds every theme it finds
# into /ui/<name>/, and this file controls what the gallery says about them.
- name: artsy
  title: Artsy
  description: >-
    A warm exhibition-catalogue UI: paper grain, serif display, drop caps,
    hand-painted ochre strokes, and photos hung like tilted canvases.
- name: example
  title: Example
  description: >-
    A minimal demonstration theme showing the two basic moves: an extra
    stylesheet layered on the regular site, and a badge showing which theme
    is active.
- name: techy
  title: Techy
  description: >-
    A dark, terminal-inspired UI in a page-wide two-column layout: sticky
    sidebar with tree-style menus, monospace type, neon green/cyan accents.
