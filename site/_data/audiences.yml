# Reading levels for adaptive content (stretchtext / complexity levels).
# The levels describe TEXT COMPLEXITY only — who typically reads at which
# level (kids, general public, academics, experts) is described in the
# communication strategy, not encoded here, to avoid mixing roles into
# the ladder.
#
# Pages opt in with `adaptive: true` in front matter and wrap variant
# content in <div class="adaptive" data-for="<key>" markdown="1"> blocks.
# See the wiki page "Adaptive Content" for the authoring guide.
#
# `default` is shown to first-time visitors and when JavaScript is off.
default: standard

groups:
  - key: simple
    label:
      en: "Simple"
      nb: "Enkel"
    description:
      en: "Short and simple, no jargon"
      nb: "Kort og enkelt, uten fagspråk"

  - key: standard
    label:
      en: "Standard"
      nb: "Standard"
    description:
      en: "Plain language for everyone"
      nb: "Klarspråk for alle"

  - key: detailed
    label:
      en: "Detailed"
      nb: "Detaljert"
    description:
      en: "More background and precision"
      nb: "Mer bakgrunn og presisjon"

  - key: advanced
    label:
      en: "Advanced"
      nb: "Avansert"
    description:
      en: "Full detail, nothing simplified away"
      nb: "Alle detaljer, ingenting forenklet"
