# Maps NVA research keywords to broader display groups on the people network.
# Each person tag matches the first group with an exact tag hit, then the first
# pattern substring match. Unmatched tags are shown under their original name.
groups:
  - label: Artificial intelligence
    tags:
      - Artificial intelligence

  - label: Music & sound
    tags:
      - Music Technology
      - Sound Art
      - Sound analysis /synthesis
      - Musicology
      - Systematic musicology
      - Music
      - Music education
      - Creative music education
      - Music and health
      - Music Improvisation
      - Construction of musical instruments
      - Sound sculpture
      - Human Interface Devices
      - Sound/music in new media
      - Sound/music installations
      - Piano/ Keyboard
      - Songwriting
    patterns:
      - music
      - sound

