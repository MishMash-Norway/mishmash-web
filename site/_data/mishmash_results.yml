    title: Performative Togetherness in networked music–dance performance
    container: International Journal of Performance Arts and Digital Media.
    details: 'ISSN 1479-4713. p. 1–22. doi: 10.1080/14794713.2026.2657654.'
    abstract: This article examines how performative togetherness is constructed in
      a technologically mediated music–dance performance environment. While togetherness
      is often associated with co-presence and effortless flow, networked contexts
      introduce perceptual reconfiguration that makes it fragile and effortful. We
      present the research concert Telematic@PopSenteret, a networked performance
      involving dancers and musicians distributed across two floors in a museum, connected
      through audio–video transmission. Using interviews and audio-video recordings,
      we explore how latency, fractured perception, and the absence of bodily cues
      transformed the performers’ coordination and induced cognitive strain. We discuss
      how performative togetherness – defined as the sense of shared meaning-making
      that emerges through attentional, sensory, and adaptive negotiation – was maintained
      during the performance.
