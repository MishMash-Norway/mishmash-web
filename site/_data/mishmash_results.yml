    title: The emergence and potential decline of cloud-based sample platforms
    container: Symposium on the Platformization of Music Production.
    details: Oslo.
    abstract: This presentation explores the emergence of cloud-based sample platforms
      like Splice and Loopcloud and consider their potential decline in the age of
      AI-generated music. Sabrina Carpenter’s hit single “Espresso,” released on April
      11th, 2024, put the spotlight on the ubiquitous use of online sample platforms
      in popular music. The songs’ main intrumental elements-guitars and drums-stem
      from two loops of producer Oliver’s popular pack “Power Tools Sample Pack III”
      on the sample platform Splice. This caused a surge of social media posts demonstrating
      how the instrumental track could be recreated in little under a minute. This
      form of sampling—both cheap and legal, fast and convenient—represents a distinctly
      different take on sampling than that commonly associated with “golden age hip
      hopproductions”, where samples are extracted from existing recordings (Brøvig
      2023; McLeod and Dicola 2011; Schloss 2004). Besides being more efficient, these
      sample platforms’ royalty-free models allow producers to use samples freely
      without fear of legal action. Our presentation will begin by examining the factors
      leading to the emergence of cloudbased sample platforms. While the legal aspects
      might have contributed to the development of sampling platforms, we will also
      trace the platforms’ rootedness in less explored areas ranging from “library
      music,” to synthesizer preset cassettes and sample CDs bundled with music tech
      magazines (Cameron 2020). We will then discuss how these platforms, partly due
      to their mitigation of copyright issues, have contributed to transforming the
      sampling practices and aesthetics established by early hip-hop productions while
      also encouraging other forms of practices (Arrieta 2021). Lastly, we will discuss
      whether the advent of AIgenerated music technology has the potential to disrupt
      the sample industry altogether. This work will draw on research on sampling,
      copyright and musical platforms, and include insights gained from our interviews
      with producers of sample packs.
