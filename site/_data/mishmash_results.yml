    title: 'Sounding Human: Music and Machines, 1740/2020. By Deirdre Loughridge'
    container: Music & Letters.
    details: 'ISSN 0027-4224. doi: 10.1093/ml/gcag043.'
    abstract: ‘It isn’t real music!’ As I write this review there is an ongoing debate
      in Norwegian media about a band that has been booked to play in a festival next
      summer. The band is composed of human performers, but they are playing songs
      generated by AI. Or, more precisely, they have written the lyrics themselves
      and then fed them into a commercial AI-based music service that has created
      a melody and accompaniment. Is this ‘AI music’? Is it ‘real music’? Is it more
      or less ‘real’ whether they play acoustic instruments or laptops on stage? And,
      ultimately, does it matter who made what if people want to listen? To understand
      today’s disruptive introduction of AI-based commercial services better, it may
      help to look more closely at history. This is where Deirdre Loughridge’s book
      is a timely and valuable contribution. It reveals that human fascination with—and
      harsh scepticism of—machine-generated music is nothing new.
