    title: Technologies supporting research on music-related body motion
    container: 'In Their Hands: Emerging Participatory Technologies Supporting Professional
      Practice.'
    details: Belval.
    abstract: 'As researchers, we are increasingly using emerging technologies, such
      as multiple mobile eye tracking, virtual reality, and physiological indicators
      (e.g., heart rate and respiration) to study professionals’ individual and collaborative
      work practices. In this workshop, we will demonstrate how these technologies
      can be provided to professionals in various fields (e.g., education, healthcare,
      business, engineering, the arts) as a resource for self-reflection, enabling
      them to study and improve their own practices.


      The goal of this workshop is to introduce and facilitate participants to experience
      novel approaches that use these emerging technologies and tools to help practitioners
      study their own skills and understand their learning processes. We will also
      show how focus groups and stimulated recall interviews can encourage and guide
      professionals to discover ways to incorporate these new technologies into their
      practice as resources for reflection and growth.


      The workshop’s theme is educational practice and research, with a focus on showing
      how we can offer teachers theoretically driven and empirically validated methodologies
      for witnessing the micro-processes of collaborative mathematics learning. We
      will show and discuss how multiple mobile eye-tracking and virtual reality can
      be used in educational practice and for teacher training and professional development.


      This approach and these emerging technologies are applicable not only in education,
      but also in all other fields of research that aim to study individual and collective
      practices, as well as professional learning, during the process of acquiring
      new skills or improving existing ones.'
