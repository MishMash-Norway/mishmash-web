    title: LightHearted—A Framework for Mapping ECG Signals to Light Parameters in
      Performing Arts
    container: In Brooks, Anthony L. (Eds.), Proceedings of the 14th EAI International
      Conference on ArtsIT, Interactivity and Game Creation, ArtsIT 2025.
    details: 'Springer. ISBN 9783032269997. p. 719–738. doi: 10.1007/978-3-032-26999-7_18.'
    abstract: This paper presents LightHearted, an open-source Python framework for
      mapping the heart’s electrical activity from electrocardiography (ECG) signals
      acquired from performers to stage lighting in a concert setting. The aim is
      to provide dynamic lighting coupled to the physiological processes occurring
      during performance. Drawing upon critical approaches towards using biosignals
      in interactive systems and live concert research, we outline the framework’s
      design and implementation and present a case study with the Aarhus Symphony
      Orchestra. This paper highlights both technical and conceptual challenges of
      integrating biosensor-based lighting into a large-scale orchestral context.
      Results from a post-concert audience survey (N = 324) suggest that while responses
      to the lighting were mixed, it was generally not perceived as distracting and
      would be welcomed for use in future concerts.
