    abstract: 'Arrangementet Design Agentics: Creative R&D x AI undersøker kunstig
      intelligens som en integrert del av design- og kunstpraksis, ikke bare som verktøy,
      men som infrastrukturell og agentisk aktør. Gjennom en studentpresentasjon av
      egenutviklede AI-baserte verktøy og en påfølgende panel- og rundebordsdiskusjon
      med forskere og bransjeaktører, tematiserer arrangementet hvordan kreative praktikere
      kan forholde seg kritisk og operativt til eksisterende AI-systemer. Fokus ligger
      på spørsmål om handlingsrom, makt og design i møte med ferdigdefinerte teknologiske
      infrastrukturer, samt muligheter for å omforme, tilpasse eller motsette seg
      disse. Arrangementet avsluttes med lanseringen av forskningsgruppen CRAITR ved
      AHO.'
