    title: Kan musikk skape fred?
    container: Kan musikk skape fred?.
    details: Oslo.
    abstract: På konsert føler vi samhold med fremmede, viser forskning. I et kort
      øyeblikk samler musikken oss. Hvordan kan musikk også samle oss i urolige tider?
      Flere artister jobber for fred, på ulike måter. Møt noen av dem på Scene Domus
      Bibliotheca! Hva er det med akkurat musikk som forener oss? Bli med på musikksnakk
      med artistene Birgitte Grimstad, Lars Klevstrand og Andreas Røysum. Du møter
      også fredsforsker Kristin Bergtora Sandvik. Her vil musikkprofessor Alexander
      Refsum Jensenius lede samtalen med ulike spørsmål knyttet til tematikken – kanskje
      svarer de på ditt spørsmål også? Samtalen er beregnet for et publikum uten faglig
      bakgrunn i temaet.
