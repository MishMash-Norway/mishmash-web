    title: '"Soft" and "Hard" research? Experiences from running a radically interdisciplinary
      research centre'
    container: Axes of Interdisciplinary Knowledge.
    details: Coimbra.
    abstract: In this presentation, Alexander Refsum Jensenius explores the practical
      and theoretical dimensions of running radically interdisciplinary research centres,
      focusing on his experiences with RITMO and the newly established MISHMASH Centre
      for AI and Creativity. He introduces the "coffee machine" philosophy, which
      advocates for physical colocation and social meeting points as essential tools
      to overcome institutional silos and bridge the diverse research motivations
      of fields like musicology, informatics, and psychology. Jensenius highlights
      the innovative potential of this approach through projects that translate artistic
      research into medical applications, such as using dance analysis software to
      screen infants for cerebral palsy and investigating the impact of musical stimuli
      on biological cells. He further details the MusicLab initiative, which scales
      data collection to full symphony orchestras to study embodied music cognition
      and human behaviour in real-life concert settings. The talk concludes by introducing
      MISHMASH, a national consortium dedicated to fostering human-centric AI that
      integrates artistic practice with technological development while navigating
      ethical challenges such as copyright and the preservation of cultural heritage.
