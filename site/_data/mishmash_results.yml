    title: KI i kreative prosesser
    container: Ledelse og kreativitet i hybride arbeidsmiljøer (EVU).
    details: Handelshøyskolen, UiA.
    abstract: 'Foredraget handler om hvordan kunstig intelligens kan brukes i kreative
      prosesser, spesielt innen kunst og utdanning. KI utfordrer tradisjonelle forståelser
      av kreativitet, som tidligere har vært definert gjennom originalitet og verdi,
      og at nye perspektiver også inkluderer intensjon og autentisitet.


      Foredraget understreker forskjellen mellom produktivitetsøkning og kreativitet:
      KI er svært effektiv til å effektivisere produksjon, men dette er ikke det samme
      som å styrke den kreative prosessen. Når kreative oppgaver automatiseres, kan
      også verdien og eksklusiviteten av resultatet reduseres.


      KI kan brukes i flere deler av kreative prosesser, som idéutvikling, eksperimentering,
      produksjon og kuratering, og kan fungere både som verktøy, samarbeidspartner
      eller materiale. Samtidig vil KI ofte trekke mot det generelle og statistisk
      sannsynlige, noe som gjør menneskelig perspektiv og kunstnerisk intensjon fortsatt
      viktig. Foredraget fremhever også at virkelig kreativ bruk av KI ofte krever
      teknologisk kompetanse og programmering, og at uten dette blir bruken lett overfladisk.
      Hovedpoenget er at KI ikke bare bør brukes til effektivisering, men til å utvide
      det kreative handlingsrommet og muliggjøre nye kunstneriske prosesser og uttrykk.'
