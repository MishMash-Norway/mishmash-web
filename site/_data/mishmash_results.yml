    title: Bodies in Motion in the Concert Hall and Beyond
    container: International Conference on Movement and Computing.
    details: Montpellier.
    abstract: Motion is at the core of how we experience and understand the world,
      express ourselves, and interact with others. At RITMO, we explore motion that
      is artistic, expressive, and interactive within a highly interdisciplinary research
      environment that integrates musicology, psychology, and technology. Increasingly,
      we are moving our research out of the lab and into the real world, where we
      can study people behaving as they normally do and capture unique occurrences
      that cannot be simulated in laboratory conditions. This transition is illustrated
      by the MusicLab and Bodies in Concert projects, which investigate bodily activity
      and experiences in performers and audience members during live concerts. From
      data collected during a series of symphony orchestra concerts, we are learning
      how musicians coordinate their expressive motion and how audiences synchronize
      in their bodily responses to the music. We are also learning how to adapt new
      technologies for real-world data capture, and exploring how captured data can
      be used for artistic purposes. In this talk, we will discuss some of the concepts,
      methods, and findings from this line of research.
