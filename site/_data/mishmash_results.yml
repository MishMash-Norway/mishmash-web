    title: Concientia
    container: Samtale om bevissthet og det å skape.
    details: Oslo.
    abstract: 'I forbindelse med utstillingen Conscientia på Gamle Munch arrangeres
      en samtale om bevissthet og det å skape.

      Utgangspunktet for tema til utstillingen er bevissthet og forhold knyttet til
      det å skape.

      En del av utstillingen tar utgangspunkt i en serie med selvportretter av Randi
      Wøien basert på MR bilder tatt av hennes eget hode. Bildene representerer et
      sett av intrikate mønstre i ulike størrelser og sammensetninger og kan refereres
      til ulike organer, andre vesener og ren natur. Samtidig er de en representasjon
      av kunstneren slik hun er satt sammen i sitt eget hode. Keramiker Jorid Krosse
      lager objekter med form og mønster som tar inspirasjon fra naturen og kan relateres
      til organiske strukturer, hoder og andre vesener. I samspill med maleriene vil
      de keramiske objektene settes i en relasjon til det kroppslige.

      Samtalen om bevissthet og det å skape bruker utstillingen som et utgangspunkt
      til å få belyst hva den skapende prosessen kan bety for vår egen utvikling og
      hvordan hjernen fungerer og responderer på skapende prosesser. Tema for samtalen
      vil være forholdet mellom kunst og bevissthet, om relasjonen mellom maleri og
      objekt og om hvordan det å skape kunst kan påvirke vår forståelse av oss selv
      og omgivelsene.

      For tiden forskes det mye på hva som faktisk skjer i hjernen når man skaper
      noe. Vi har fått med oss to av de fremste forskerne på temaet fra universitetet
      i Oslo.

      Alexander Refsum Jensenius er professor i musikkteknologi ved Universitetet
      i Oslo, hvor han også leder RITMO Senter for tverrfaglige studier av rytme,
      tid og bevegelse og MishMash Senter for KI og kreativitet. Han forsker på hvordan
      lyd og musikk påvirker kropp og sinn, bevisst og ubevisst.

      Tor Endestad er førsteamanuensis i kognitiv- og nevropsykologi på univeristetet
      i Oslo og er tilknyttet Ritmo. Han leder FRONT neurolab og forsker på kognitiv
      psykologi og kognitiv nevrovitenskap med fokus på hjerneavbildningsmetodikk.
      Pågående forskningsprosjekter omfatter studier av basale mekanismer i oppfattelse
      av rytme og tid, oppmerksomhet og hukommelse.

      Til å moderere samtalen har vi fått med oss Per Snaprud. Han er vitenskapsjournalist
      og før det hjerneforsker. Han arbeider i det Stockholm baserte magasinet Forskning
      og Framsteg og har tidligere vært virksom ved Dagens Nyheters og Sveriges Radios
      vitenskapsredaksjoner. Han er også forfatter av boken «Medvetandets återkomst,
      om hjärnan, kroppen och universum».

      Victoria Johnson er fiolinist, underviser ved Institutt for musikkvitenskap
      og deltar i ulike forskningsprosjekter ved UiO. Hun har hatt solokonserter blant
      annet under Festspillene i Bergen, Ultima, Borealisfestivalen og Soundwaves
      i London. Hennes lidenskap for samtidsmusikk har resultert i flere bestillingsverk
      og plateinnspillinger. I denne sammenhengen vil hun spille musikk som er direkte
      komponert til bildene og objektene i utstillingen.'
