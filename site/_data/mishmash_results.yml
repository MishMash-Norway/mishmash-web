    title: Video Visualization - Learn to use MG Toolbox
    container: Experimental and Participatory Research seminar.
    details: Belval.
    abstract: This workshop is targeted at students and researchers working with video
      recordings You will learn to use MG Toolbox, a Python package with numerous
      tools for visualizing and analyzing video files. This includes visualization
      techniques such as motion videos, motion history images, and motiongrams; techniques
      that, in different ways, allow for looking at video recordings from different
      temporal and spatial perspectives. It also includes some basic computer vision
      analysis, such as extracting quantity and centroid of motion, and using such
      features in analysis. MG Toolbox for Python is a collection of high-level modules
      that generate all of the above-mentioned visualizations.The toolbox is relevant
      for everyone working with video recordings of humans, such as in linguistics,
      psychology, medicine, human-computer interaction, and educational sciences.
