    title: Technologies of Capture and the Global Souths
    container: In Rudi, Jøran, Adkins, Monty (Eds.), The Routledge Handbook to Rethinking
      the History of Technology-Based Music.
    details: 'Routledge. ISBN 9781003430599. doi: 10.4324/9781003430599-20.'
    abstract: In this chapter, the colonial intervention of the technologies of capture
      are examined in the Global South regions, especially in South Asia in the beginning
      of the twentieth century. I study the ramifications of this entry in the form
      of mutating everyday sounds and musical practices into commodified sound objects
      for industrialisation and sale. From a critical decolonial position, this introduction
      of the technologies of capture is read here as a precarious intrusion into the
      sounding and listening cultures of the Global Souths, and a moment of emergence
      of an extractive capitalism through the colonial routes that devastate the sonic
      symbiosis of the land.
