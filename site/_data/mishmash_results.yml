    title: Mixed Method Audio-Video Analyses of Felt Togetherness in a Networked Music-Dance
      Performance
    container: 'In Guyot, Patrice, Bosselut, Gregoire (Eds.), MOCO ''26: Proceedings
      of the 10th International Conference on Movement and Computing.'
    details: 'Association for Computing Machinery (ACM). ISBN 9798400725005. doi:
      10.1145/3802842.3802884.'
    abstract: This paper presents a mixed-method approach to investigating the felt
      experience of a networked music–dance performance. Using this approach, we explore
      how a sense of togetherness emerges even when performers are distributed across
      distant spaces. Drawing on data from the Telematic@Popsenteret research concert,
      we propose a three-layered analytical framework that integrates computer-based
      audio-video analyses with qualitative observation, and post-performance interviews.
      By combining sound–motion synchrony and temporal coupling with performers’ and
      audience members’ experiential accounts, we examine how dancers and musicians
      negotiate coordination and shared presence in a telematic environment. Our findings
      suggest that togetherness in such settings is not merely a matter of temporal
      alignment, but a dynamically constructed, multimodal process involving perceptual
      adaptation, cross-modal attunement, and affective awareness.
