    title: Permeating Art & Science Collaboration
    container: Uroboros Festival.
    details: Praha.
    abstract: 'Panel discussion with Robertina Šebjanič, Anetta Mona Chişa, Alexander
      Refsum Jensenius. Moderated by Benedetta D''Ettorre.


      This panel examines the boundary zones where artistic and scientific approaches
      intersect, entangle, and permeate into one another. Bringing together practitioners
      working across more-than-human ecologies, technological imaginaries, and embodied
      research, the conversation will explore how meaningful collaboration can emerge
      from inter- and trans-disciplinary exchange.


      Rather than framing art and science as opposites, we ask how their methods can
      become mutually generative; how artistic mindsets can expand scientific inquiry,
      and how scientific perspectives can deepen artistic experimentation. The session
      aims to discuss questions related to collaborative ethics, shared vocabularies,
      and the value of embracing “noise” as a catalyst for new forms of knowledge-making.'
