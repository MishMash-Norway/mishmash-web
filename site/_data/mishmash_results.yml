    title: 'Pixasonics: An Image Sonification Toolbox for Python'
    container: In Roddy, Stephen, Martins, Pedro, Cardoso, F. Amílcar, Vickers, Paul
      (Eds.), Proceedings of the 30th International Conference on Auditory Display
      (ICAD 2025).
    details: Department of Informatics Engineering, University of Coimbra, Portugal.
      ISBN 9798991456210. p. 28–35.
    abstract: Pixasonics is a new Python library for interactive image analysis and
      exploration through image sonification. It uses real-time audio and visualization
      to help uncover patterns in image data. With Pixasonics, users can launch one
      or more small web applications (running in a Jupyter Notebook), probe image
      data using various feature extraction methods, and map those feature vectors
      to synthesis parameters. The target users are researchers interested in exploring
      image and volumetric data and creative users who want an intuitive tool for
      experimental sound design. Pixasonics’ design aims to strike a balance between
      an easy-to-use web application with minimal boilerplate code necessary and a
      library that can be integrated into more advanced workflows. Real-time exploration
      is at the heart, but it can also be used to script non-real-time sonifications
      of large datasets. This paper presents Pixasonics, its structure, interface,
      and advanced features, and discusses preliminary feedback from biology researchers
      and music technologists.
