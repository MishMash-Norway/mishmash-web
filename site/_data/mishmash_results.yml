    slug: university-of-bergen
    url: /institutions/university-of-bergen/
  citation:
    authors: []
    title: Atomspheres
    container: ''
    details: ''
    abstract: Atomspheres is a series of performances on elemental listening engagement
      and meditative environmental attunement, leading to a participatory performance
      with the co-listeners. The performances attune to the macro-scale crises of
      the climate and ecology in a planetary context and bridges its intersection
      with micro-level coping strategies to the crises in a regenerative gathering.
      The performances resonate with the tradition of free improvisation as well as
      communal and participatory sonic gatherings for affective and discursive engagement
      with crises and conflict, practiced in many Global Souths cultures. These performance
      gatherings involve field recordings of climate variables like wind, water, and
      woods, comprovised by chance generative processes, accompanied by radio interferences
      transducing situated weather patterns, weaved together by meditative instrumental
      interventions of traditional instruments, as well as live electronics and algorithmic
      interpretation of data and assemblages embracing free improvisational techniques
      and ethos. As an invocation, the series invites the co-listeners into an exercise
      of slow listening and slow breathing that try to suspend time, control, ego,
      and individuality to tap into a humbler mode of fatalism and a distributed self-hood.
      This philosophical positioning stresses the subjugation of events or actions
      to fate or destiny and is commonly associated with an attitude of acceptance
      in the face of future events, which are thought to be inevitable. This approach
      manifests into yielding control by an emergent form of togetherness, intersubjectivity,
      and kinship when listening transcends an overt causality, and the psychosomatic
      condition embraces slow breathing to contemplate, and affective attunement.
      The project is inspired by the micro-level entanglements of human, more-than-human,
      and other life forms in a survival context, and explores sensory transduction
      of environmental conditions to figure how to make them post-immersive and attuning
      experiences in an openly circular, collaborative performance setting.
    full_text_url: https://hdl.handle.net/11250/5510677
    full_text_kind: archive
