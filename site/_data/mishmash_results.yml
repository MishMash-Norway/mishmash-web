    title: 'Kunst i intelligens: Hvilke nye kreative uttrykksmuligheter kan KI åpne
      for?'
    container: Debatt unde Arendalsuka.
    details: KI-teltet, Arendalsuka 2025, Arendal.
    abstract: "Ny teknologi har alltid hatt evnen til å forenkle og effektivisere\
      \ etablerte arbeidsoppgaver, men med det følger også frykten for at funksjoner\
      \ og individer blir overflødige. Hva skjer når teknologien strekker seg forbi\
      \ det kjente og utfordrer oss til å utforske noe nytt?\r\n\r\nKunstig intelligens\
      \ (KI) gir oss muligheten til å stille disse spørsmålene på en ny og spennende\
      \ måte. Hvilke nye kreative uttrykksmuligheter kan KI åpne for? Hvordan kan\
      \ kunsten utfordre og subvertere KI? Hvordan kan vi forstå lyd, bilde, video\
      \ og litterær tekst generert av KI i forhold til autentiske kunstneriske uttrykk?\
      \ Hvor overlapper og utfyller de hverandre, og hvor er de fundamentalt forskjellige?\r\
      \n\r\nKunsten har et ansvar for å gå i kritisk dialog med KI, for å bidra til\
      \ en dypere forståelse og debatt om KIs natur og samfunnspåvirkning. Hvordan\
      \ skal kunstutdanningene ta dette ansvaret, gjennom kunstnerisk utviklingsarbeid,\
      \ forskning og utdanning?\r\n\r\nVi inviterer til en debatt der vi sammen utforsker\
      \ disse spørsmålene og mer. Bli med oss i en diskusjon om kreativitet, subversjon\
      \ og autentisitet i møte med kunstig intelligens. Velkommen!"
