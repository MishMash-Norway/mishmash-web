    title: 'Artificial Consciouness: Regenerating AI Ethics and Aesthetics'
    container: International Conference Media Art History.
    details: Manizales.
    abstract: 'Globally, in the arena of everyday practices, AI systems have increasingly
      been causing a profound effect on contemporary everyday life across the globe.
      From surveillance to the Internet of Things and domestic consumption, from social
      media interactions to arts and culture, AI is taking over the processing of
      information to provide new perceptions and augmented experiences. At the core
      of this reconfiguration of technologically mediated everyday practice are datasets,
      used to drive and produce new narratives across wider ranges: consumer behavior
      and patterns, mobility, and immigration, post-human thinking, scientific in(ter)ventions,
      media production and propaganda, online and offline social formations, etc.
      In this context, the proposed panel presents the collective research of the
      newly formed Center for AI Ethics, Aesthetics and Creative Human Operations
      (CAIEAC) at The Art Academy – Department of Contemporary Art (KMD), University
      of Bergen, Norway. The centre aims to reimagine the integration of artificial
      intelligence in creative human operations and to challenge hegemonial AI tropes.
      By moving beyond the binary of utopian and dystopian paradigms, the centre embraces
      a “Prototopian" model that envisions continuous improvement in adjusting AI
      technologies to society. The centre fosters innovative and critical approaches
      to AI, focusing on computational aesthetics, the expansion of creativity through
      human-machine collaboration, and the development of new conceptual frameworks
      informed by art, media theory, and interdisciplinary research based on a reflective
      and inclusive AI landscape that integrates ethical considerations, addresses
      biases, and promotes decolonial and Indigenous knowledge into different AI infrastructures
      for a diverse society. The proposed panel will address the ethical lapses in
      AI with a regenerative approach to consciousness. Especially engaging with applied
      AI in the arts, the panel explores the creativity-induced resistance against
      a monolithic world of AI that populates contemporary everyday practices, as
      mentioned earlier. The panel will advocate for an ethical and inclusive AI system
      for the future that is emergent, self-reflective, and self-regulating, with
      an aesthetic inclination towards artistic experimentation and radical innovations
      by being susceptible to the questions of social justice and political agency.'
