    title: Mellom menneske og maskin
    container: Panelsamtale.
    details: Oslo.
    abstract: 'Hva skjer med vår opplevelse av virkelighet, kropp, natur og kreativitet
      når grensene mellom det menneskelige og det syntetiske blir mer flytende?


      Samtalen har ikke til hensikt å konkludere om kunstig intelligens er bra eller
      dårlig for kunsten. Sammen skal vi heller undersøke hva som skjer med oss som
      skapende mennesker, som publikum, og kanskje også som naturvesener, når teknologien
      begynner å produsere bilder, idéer og identiteter som tidligere bare kom fra
      menneskelig erfaring.


      Fotografiens Hus ønsker velkommen til en samtale som trekker på kunst, økologi
      og filosofi for å undersøke hvordan kunstig intelligens påvirker hvordan vi
      skaper, sanser og møter verden rundt oss på.'
