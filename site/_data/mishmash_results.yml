    title: F@ck AI or else… A roundtable discussion on music and art among cursed
      algorithms.
    container: Lyse Netter.
    details: House of Foundation, Moss.
    abstract: 'AI keeps faking it until it makes it as infrastructure. Vibing effortlessly
      with wearing language as interface for doomstyle hype, timewarping efficiency,
      subscription-based fate and a long generative etc.

      So, let''s talk about something else…

      The roundtable moves between creative practice and research, speculation and
      error, embodiment and idiocy. Beyond ritual denunciation or loving embrace,
      we open a conversation about the pleasures, traps, politics, and odd possibilities
      of working with these tools to learn (and act on) how they set the terms. As
      the slogans dry out: how to resist, how to misuse, how to play inside systems
      built to smooth everything into an average slop(py) shape. After the refusal,
      after the fatigue, after the sales pitch and the creative ditch, what else?


      Organized by AHO''s CRAITR research group'
