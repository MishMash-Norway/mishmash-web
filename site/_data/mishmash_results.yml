    title: Creativity Between Art and Science
    container: Future Manifestos Conference.
    details: Trondheim.
    abstract: First, I will present MishMash Centre for AI and Creativity, a new Norwegian
      research centre advancing AI to explore and shape human-machine creativity.
      Funded by the Research Council of Norway in 2025, the centre brings together
      artists, engineers, and scholars across disciplines to create, explore, and
      reflect on AI systems that augment creative practice while foregrounding agency,
      inclusion, and sustainability. Organized into seven work packages, the centre
      addresses technical challenges such as real-time multi-agent systems and hybrid
      symbolic learning methods, societal concerns including bias, copyright, and
      equitable value distribution, and applied domains spanning health, education,
      cultural heritage, and the creative industries.Second, I will present some of
      my own ongoing explorations into embodied AI, including inverse control, small
      language models, and distributed computing. This approach challenges current
      monolithic, generative models, suggesting an alternative future for creative
      AI.
