---
layout: default
---
<div id="pw-gate">
  <div class="mm-panel">
    <h2 style="margin-top:0;">🔒 Internal Page</h2>
    <p>This page is for MishMash members only. Please enter the password to continue.</p>
    <form id="pw-form" style="margin-top:1.5rem;">
      <label for="pw-input" class="sr-only">Password</label>
      <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password" class="mm-input" />
      <button type="submit" class="btn" style="width:100%;">Enter</button>
      <p id="pw-error" role="alert" class="mm-error" style="display:none;">Incorrect password. Please try again.</p>
    </form>
  </div>
</div>

<div id="pw-content" hidden>
  {% if page.title %}
  <h1>{{ page.title }}</h1>
  {% endif %}
  {{ content }}
</div>

<script src="{{ '/assets/js/internal-gate.js' | relative_url }}" data-hash="{{ page.password_hash | default: site.internal_password_hash }}"></script>
