{% assign loc = site.data.institution_locations[include.slug] %}
{% if loc %}
<figure class="institution-map" role="img" aria-label="{% if loc.in_norway %}Location in Norway: {{ loc.label }}{% else %}Norway map — international partner{% endif %}">
  <div class="institution-map-canvas">
    <img
      class="institution-map-image"
      src="{{ '/assets/images/maps/norway-outline.png' | relative_url }}"
      alt=""
      width="150"
      height="187"
      aria-hidden="true">
    {% if loc.in_norway and loc.x and loc.y %}
    <span class="institution-map-marker-ring" style="left: {{ loc.x }}%; top: {{ loc.y }}%;"></span>
    <span class="institution-map-marker" style="left: {{ loc.x }}%; top: {{ loc.y }}%;"></span>
    {% endif %}
  </div>
  {% if loc.in_norway and loc.label %}
  <figcaption class="institution-map-label">{{ loc.label }}</figcaption>
  {% elsif loc.in_norway == false %}
  <figcaption class="institution-map-label">International partner</figcaption>
  {% endif %}
</figure>
{% endif %}
