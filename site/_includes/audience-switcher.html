{%- assign _lang = page.lang | default: 'en' -%}
{%- if _lang == 'nb' -%}{%- assign _switcher_label = 'Lesenivå:' -%}{%- else -%}{%- assign _switcher_label = 'Reading level:' -%}{%- endif -%}
<div class="audience-switcher" role="group" aria-label="{{ _switcher_label }}" data-default="{{ site.data.audiences.default }}" hidden>
  <span class="audience-switcher-label">{{ _switcher_label }}</span>
  {%- for g in site.data.audiences.groups %}
  <button type="button" data-audience-choice="{{ g.key }}" aria-pressed="false" title="{{ g.description[_lang] | default: g.description.en }}">{{ g.label[_lang] | default: g.label.en }}</button>
  {%- endfor %}
</div>
