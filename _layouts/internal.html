---
layout: default
---
<div id="pw-gate">
  <div style="max-width:420px;margin:3rem auto;padding:2rem;border:1px solid #d9d9df;border-radius:10px;background:#fafafe;text-align:center;">
    <h2 style="margin-top:0;">🔒 Internal Page</h2>
    <p>This page is for MishMash members only. Please enter the password to continue.</p>
    <form id="pw-form" style="margin-top:1.5rem;">
      <label for="pw-input" class="sr-only">Password</label>
      <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password"
        style="width:100%;padding:0.6rem 0.8rem;border:1px solid #bbb;border-radius:8px;font-size:1rem;margin-bottom:0.8rem;box-sizing:border-box;" />
      <button type="submit" class="btn" style="width:100%;">Enter</button>
      <p id="pw-error" role="alert" style="color:#c0392b;margin-top:0.6rem;display:none;">Incorrect password. Please try again.</p>
    </form>
  </div>
</div>

<div id="pw-content" hidden>
  {{ content }}
</div>

<script>
(function () {
  var SESSION_KEY = 'mm_internal_auth';
  var HASH = '{{ page.password_hash | default: site.internal_password_hash }}';

  function buf2hex(buf) {
    return Array.from(new Uint8Array(buf)).map(function (b) {
      return b.toString(16).padStart(2, '0');
    }).join('');
  }

  function sha256(text) {
    var enc = new TextEncoder();
    return crypto.subtle.digest('SHA-256', enc.encode(text)).then(buf2hex);
  }

  function unlock() {
    document.getElementById('pw-gate').style.display = 'none';
    document.getElementById('pw-content').removeAttribute('hidden');
  }

  if (sessionStorage.getItem(SESSION_KEY) === HASH) {
    unlock();
    return;
  }

  document.getElementById('pw-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var val = document.getElementById('pw-input').value;
    sha256(val).then(function (h) {
      if (h === HASH) {
        sessionStorage.setItem(SESSION_KEY, HASH);
        unlock();
      } else {
        document.getElementById('pw-error').style.display = 'block';
      }
    });
  });
})();
</script>
